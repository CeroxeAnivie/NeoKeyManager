nkm.usage.help.add=key add <name> <balance> <expire> <port> <rate> [web] - Add new key
nkm.usage.help.set=key set <name> [b=balance] [r=rate] [p=port] [t=time] [w=true/false] [c=max_conns] [n=newname] - Update key
nkm.usage.help.setconn=key setconn <key> <num> - Set max connections
nkm.usage.help.del=key del <name> [name2...] - Delete keys
nkm.usage.help.map=key map <name> <node1> [node2...] <port> - Map key to nodes
nkm.usage.help.delmap=key delmap <name> <node1> [node2...] - Remove mappings
nkm.usage.help.delnode=key delnode <nodeid> - Delete all mappings for a node
nkm.usage.help.list=key list [nomap] - List all keys
nkm.usage.help.lp=key lp <name> - Lookup specific key details
nkm.usage.help.toggle=key enable/disable <name> - Toggle key status
nkm.usage.help.web=key web enable/disable <name> - Toggle Web HTML
nkm.usage.help.link=key link <alias> to <target> - Create alias
nkm.usage.help.single=key setsingle/delsingle/listsingle ... - Manage Single Mode
